# TBH Box - Windows 11 in a container (dockur/windows)
# Config lives in .env (generated by install.bat). Ports are pinned to
# 127.0.0.1 on purpose: only this PC can reach the box. To expose it on
# the local network, replace "127.0.0.1:" with "0.0.0.0:" (read the
# Security section of the README).
services:
  windows:
    image: dockurr/windows
    container_name: tbh-box
    # HARD CPU ceiling on the host: the box never exceeds this, no matter what
    # (WARP/software rendering). 2.0 = 2 cores. Top-level compose v2 key.
    cpus: ${BOX_CPUS:-2.0}
    environment:
      # variables prefixed with BOX_ so they are not shadowed by
      # host environment variables (e.g. VERSION, USERNAME)
      VERSION: "${BOX_VERSION:-11l}"
      RAM_SIZE: "${BOX_RAM_SIZE:-4G}"
      CPU_CORES: "${BOX_CPU_CORES:-2}"
      DISK_SIZE: "${BOX_DISK_SIZE:-32G}"
      # qcow2 = THIN disk: it uses only what it needs (~15 GB), not the full 64 GB.
      # On an existing disk, dockur converts raw->qcow2 on the next boot (no reinstall).
      DISK_FMT: "${BOX_DISK_FMT:-qcow2}"
      DISK_DISCARD: "unmap"
      USERNAME: "${BOX_USERNAME:-Docker}"
      PASSWORD: "${BOX_PASSWORD:-admin}"
      # keeps the MCP port forwarded even if the container falls back
      # to user-mode networking (no /dev/net/tun); harmless in NAT mode
      USER_PORTS: "8000"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - "127.0.0.1:8006:8006"          # screen via browser (noVNC)
      - "127.0.0.1:3389:3389/tcp"      # RDP
      - "127.0.0.1:3389:3389/udp"
      - "127.0.0.1:8000:8000"          # Windows-MCP (AI access)
    volumes:
      - ./storage:/storage             # Windows disk (persistent)
      - ./oem:/oem                     # automatic guest provisioning
      - ./shared:/shared               # "Shared" folder on the desktop
    restart: unless-stopped
    stop_grace_period: 2m
